<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Indigo Yield Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .offline-container {
      background: white;
      border-radius: 16px;
      padding: 48px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      text-align: center;
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #f3f4f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon svg {
      width: 40px;
      height: 40px;
      stroke: #6b7280;
    }
    
    h1 {
      color: #111827;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    
    p {
      color: #6b7280;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    
    .skeleton {
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    @keyframes loading {
      0% {
        background-position: 200% 0;
      }
      100% {
        background-position: -200% 0;
      }
    }
    
    .skeleton-title {
      height: 32px;
      width: 60%;
      margin: 0 auto 16px;
    }
    
    .skeleton-text {
      height: 20px;
      width: 100%;
    }
    
    .skeleton-text:nth-child(3) {
      width: 80%;
    }
    
    .retry-button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .retry-button:hover {
      background: #4338ca;
    }
    
    .retry-button:active {
      transform: scale(0.98);
    }
    
    .status-text {
      color: #059669;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }
    
    .status-text.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"></path>
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some features may be unavailable until you're back online.</p>
    
    <div class="skeleton skeleton-title"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text"></div>
    
    <button class="retry-button" onclick="retryConnection()">
      Retry Connection
    </button>
    
    <div class="status-text" id="status">Checking connection...</div>
  </div>
  
  <script>
    function retryConnection() {
      const statusEl = document.getElementById('status');
      statusEl.textContent = 'Checking connection...';
      statusEl.classList.add('show');
      
      // Try to fetch a small resource
      fetch('/manifest.json', { method: 'HEAD' })
        .then(() => {
          statusEl.textContent = 'Connection restored! Redirecting...';
          statusEl.style.color = '#059669';
          setTimeout(() => {
            // Reload the page or go back
            if (window.history.length > 1) {
              window.history.back();
            } else {
              window.location.href = '/';
            }
          }, 1000);
        })
        .catch(() => {
          statusEl.textContent = 'Still offline. Please check your connection.';
          statusEl.style.color = '#dc2626';
          setTimeout(() => {
            statusEl.classList.remove('show');
          }, 3000);
        });
    }
    
    // Auto-retry every 30 seconds
    setInterval(() => {
      fetch('/manifest.json', { method: 'HEAD' })
        .then(() => {
          window.location.reload();
        })
        .catch(() => {
          // Still offline
        });
    }, 30000);
    
    // Listen for online event
    window.addEventListener('online', () => {
      const statusEl = document.getElementById('status');
      statusEl.textContent = 'Back online! Refreshing...';
      statusEl.style.color = '#059669';
      statusEl.classList.add('show');
      setTimeout(() => {
        window.location.reload();
      }, 1000);
    });
  </script>
</body>
</html>
