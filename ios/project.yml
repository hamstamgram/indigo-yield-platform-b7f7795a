name: IndigoInvestor
options:
  bundleIdPrefix: com.indigo
  deploymentTarget:
    iOS: 14.0
    watchOS: 9.0
  developmentLanguage: en
  xcodeVersion: "16.0"
  
settings:
  base:
    PRODUCT_NAME: IndigoInvestor
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_BITCODE: NO
    
targets:
  IndigoInvestor:
    type: application
    platform: iOS
    deploymentTarget: 14.0
    sources: 
      - IndigoInvestor
    dependencies:
      - package: Supabase
      - package: Charts
      - package: Kingfisher
      - package: KeychainAccess
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.indigo.investor
        INFOPLIST_FILE: IndigoInvestor/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_COMPILATION_MODE: singlefile
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: wholemodule
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    preBuildScripts:
      - script: |
          if [ -f "${PROJECT_DIR}/Config/Secrets.xcconfig" ]; then
            cp "${PROJECT_DIR}/Config/Secrets.xcconfig" "${CONFIGURATION_BUILD_DIR}"
          fi
        name: Copy Secrets
    capabilities:
      - Push Notifications
      - Background Modes:
          - fetch
          - processing
          - remote-notification
      - Associated Domains
      - App Groups:
          - group.com.indigo.investor
      - Keychain Sharing:
          - com.indigo.investor

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.0
  Charts:
    url: https://github.com/danielgindi/Charts
    from: 5.0.0
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: 7.10.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: 4.2.2

schemes:
  IndigoInvestor:
    build:
      targets:
        IndigoInvestor: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
