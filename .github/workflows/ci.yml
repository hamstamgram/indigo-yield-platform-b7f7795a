name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  NODE_VERSION: "18"

jobs:
  lint-and-type:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build (Vite)
        run: npm run build

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test || echo "No project unit tests yet"

  sql-checks:
    name: SQL & RLS Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: supabase/postgres:15.1.0.117
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Check forbidden migration patterns
        run: |
          echo "🔍 Checking for forbidden patterns in migrations..."

          # Check for singular table name that caused the withdrawal bug
          # Exclude the compatibility view migration which legitimately uses the singular name
          if grep -rE "withdrawal_audit_log[^s_]" supabase/migrations/ | grep -vE "(AS SELECT|VIEW.*AS)"; then
            echo ""
            echo "❌ ERROR: Found 'withdrawal_audit_log' (singular) in migrations"
            echo "   Use 'withdrawal_audit_logs' (plural) instead"
            echo "   The singular name was a bug - see migration 20251226_fix_withdrawal_audit_log"
            exit 1
          fi

          echo "✅ No forbidden patterns found in migrations"

      - name: Verify financial RPC admin gates
        run: |
          echo "🔒 Verifying is_admin() gates in critical finance RPCs..."

          # Critical RPCs that MUST have is_admin() gates
          CRITICAL_RPCS=(
            "void_transaction"
            "ensure_preflow_aum"
            "apply_deposit_with_crystallization"
            "apply_withdrawal_with_crystallization"
            "apply_daily_yield_with_validation"
            "crystallize_month_end"
            "apply_transaction_with_crystallization"
            "apply_segmented_yield_distribution_v5"
            "void_and_reissue_full_exit"
            "void_and_reissue_transaction"
            "void_transactions_bulk"
            "unvoid_transaction"
            "unvoid_transactions_bulk"
            "update_transaction"
            "edit_transaction"
            "finalize_month_yield"
            "reject_withdrawal"
            "route_withdrawal_to_fees"
            "force_delete_investor"
            "update_admin_role"
            "complete_withdrawal"
            "delete_transaction"
            "finalize_statement_period"
            "start_processing_withdrawal"
            "void_fund_daily_aum"
            "set_fund_daily_aum"
            "reopen_yield_period"
            "add_fund_to_investor"
            "set_account_type_for_ib"
            "batch_reconcile_all_positions"
            "backfill_balance_chain_fix"
            "reset_all_investor_positions"
            "get_all_investors_summary"
            "get_all_dust_tolerances"
            "get_aum_position_reconciliation"
            "get_funds_daily_flows"
            "verify_aum_purpose_usage"
            "get_fund_aum_as_of"
            "get_fund_base_asset"
            "get_fund_net_flows"
            "get_transaction_aum"
            "preview_crystallization"
            "preview_merge_duplicate_profiles"
            "get_investor_fee_pct"
            "get_investor_ib_pct"
            "get_user_admin_status"
          )

          FAILED=0
          for rpc in "${CRITICAL_RPCS[@]}"; do
            # Find migrations defining this RPC and check for is_admin() or require_admin()
            if grep -l "FUNCTION.*${rpc}" supabase/migrations/*.sql 2>/dev/null | xargs grep -l "is_admin\|require_admin" > /dev/null 2>&1; then
              echo "✅ ${rpc} has admin gate"
            else
              echo "❌ ${rpc} - MISSING admin gate!"
              FAILED=1
            fi
          done

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "❌ FAIL: Critical RPCs missing admin gates"
            exit 1
          fi

          echo "Admin gate verification complete"

      - name: Check for unbounded numeric columns
        run: |
          echo "🔢 Checking for unbounded numeric in financial columns..."

          UNBOUNDED=$(grep -rnE '"(amount|fee_amount|fee_percentage|aum_percentage|cumulative_yield_earned|balance|value|gross_yield|net_yield|investor_share_pct|fund_yield_pct|fund_aum_before|fund_aum_after)" numeric[^(,]' \
            supabase/migrations/*.sql 2>/dev/null || true)

          if [ -n "$UNBOUNDED" ]; then
            echo "❌ ERROR: Unbounded numeric columns found:"
            echo "$UNBOUNDED"
            echo "   Financial columns MUST use numeric(28,10) — see ADR 002"
            exit 1
          fi

          echo "✅ No unbounded numeric columns in financial columns"

      - name: Check yield conservation identity
        run: |
          echo "💰 Checking yield conservation identity in migrations..."

          # Verify that yield calculations include conservation checks
          if grep -rE "gross.*-.*net.*-.*fee|net.*\+.*fee.*=.*gross" supabase/migrations/*.sql > /dev/null 2>&1; then
            echo "✅ Yield conservation identity patterns found"
          else
            echo "⚠️  No explicit yield conservation patterns detected"
          fi

      - name: Run migrations dry-run
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          for migration in supabase/migrations/*.sql; do
            echo "Testing migration: $migration"
            psql $DATABASE_URL -f "$migration" --single-transaction || exit 1
          done

      - name: Run invariant checks
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          echo "🔍 Running invariant checks..."
          RESULT=$(psql $DATABASE_URL -t -c "SELECT public.run_invariant_checks()::text" 2>/dev/null || echo "")
          if [ -z "$RESULT" ]; then
            echo "⚠️  run_invariant_checks() not available (no admin JWT context in CI)"
          else
            PASSED=$(echo "$RESULT" | grep -o '"passed",[0-9]*' | head -1 | cut -d, -f2)
            FAILED=$(echo "$RESULT" | grep -o '"failed",[0-9]*' | head -1 | cut -d, -f2)
            echo "📊 Invariant checks: $PASSED passed, $FAILED failed"
            if [ "$FAILED" != "0" ]; then
              echo "❌ FAIL: Invariant check failures detected!"
              echo "$RESULT"
              exit 1
            fi
          fi
          echo "✅ Invariant checks complete"

      - name: Check RLS policies
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          if [ -f "db/rls_checks.sql" ]; then
            psql $DATABASE_URL -f db/rls_checks.sql || exit 1
          else
            echo "No RLS checks found, skipping"
          fi

      - name: Check ledger integrity views
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          echo "🔍 Verifying ledger integrity views..."

          # Check that v_ledger_reconciliation excludes voided transactions
          if psql $DATABASE_URL -c "\d+ v_ledger_reconciliation" 2>/dev/null | grep -q "is_voided = false"; then
            echo "✅ v_ledger_reconciliation excludes voided transactions"
          else
            echo "⚠️  Could not verify v_ledger_reconciliation voided filter"
          fi

          # Run integrity check function if it exists
          RESULT=$(psql $DATABASE_URL -t -c "SELECT public.run_integrity_check('ci_test')::text" 2>/dev/null || echo "")
          if [ -n "$RESULT" ]; then
            echo "✅ Integrity check function executed: $RESULT"
          fi

          # Query integrity views for any anomalies (should be empty on clean slate)
          LEDGER_COUNT=$(psql $DATABASE_URL -t -c "SELECT COUNT(*) FROM v_ledger_reconciliation" 2>/dev/null || echo "0")
          echo "📊 Ledger reconciliation anomalies: $LEDGER_COUNT"

          AUM_COUNT=$(psql $DATABASE_URL -t -c "SELECT COUNT(*) FROM fund_aum_mismatch" 2>/dev/null || echo "0")
          echo "📊 Fund AUM mismatches: $AUM_COUNT"

          # Check for duplicate profiles
          DUP_COUNT=$(psql $DATABASE_URL -t -c "SELECT COUNT(*) FROM v_potential_duplicate_profiles" 2>/dev/null || echo "0")
          echo "📊 Potential duplicate profiles: $DUP_COUNT"

          # CRITICAL: Verify yield conservation views EXIST (fail if missing)
          echo "🔒 Verifying yield conservation infrastructure..."

          # Assert v_yield_conservation_check exists
          if ! psql $DATABASE_URL -c "SELECT 1 FROM v_yield_conservation_check LIMIT 0" 2>/dev/null; then
            echo "❌ FAIL: v_yield_conservation_check view does not exist!"
            echo "   Run migration 20260116000006_yield_conservation_infrastructure.sql"
            exit 1
          fi
          echo "✅ v_yield_conservation_check view exists"

          # Assert v_yield_conservation_violations exists
          if ! psql $DATABASE_URL -c "SELECT 1 FROM v_yield_conservation_violations LIMIT 0" 2>/dev/null; then
            echo "❌ FAIL: v_yield_conservation_violations view does not exist!"
            exit 1
          fi
          echo "✅ v_yield_conservation_violations view exists"

          # Assert yield_distributions table exists
          if ! psql $DATABASE_URL -c "SELECT 1 FROM yield_distributions LIMIT 0" 2>/dev/null; then
            echo "❌ FAIL: yield_distributions table does not exist!"
            exit 1
          fi
          echo "✅ yield_distributions table exists"

          # Assert yield_allocations table exists
          if ! psql $DATABASE_URL -c "SELECT 1 FROM yield_allocations LIMIT 0" 2>/dev/null; then
            echo "❌ FAIL: yield_allocations table does not exist!"
            exit 1
          fi
          echo "✅ yield_allocations table exists"

          # Check yield conservation violations (should be 0)
          CONSERVATION_COUNT=$(psql $DATABASE_URL -t -c "SELECT COUNT(*) FROM v_yield_conservation_check" | xargs)
          echo "📊 Yield conservation violations: $CONSERVATION_COUNT"

          # Check per-allocation violations
          ALLOC_VIOLATIONS=$(psql $DATABASE_URL -t -c "SELECT COUNT(*) FROM v_yield_allocation_violations" 2>/dev/null | xargs || echo "0")
          echo "📊 Yield allocation violations: $ALLOC_VIOLATIONS"

          # Check for missing withdrawal transactions (P0 bug fix verification)
          MISSING_WD_COUNT=$(psql $DATABASE_URL -t -c "SELECT COUNT(*) FROM v_missing_withdrawal_transactions" 2>/dev/null | xargs || echo "0")
          echo "📊 Missing withdrawal transactions: $MISSING_WD_COUNT"

          echo "✅ Ledger integrity verification complete"

  contract-integrity:
    name: Contract & Integrity Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify enum contracts
        run: |
          echo "🔍 Verifying enum contracts..."
          npm run contracts:verify || {
            echo "❌ Enum contract verification failed!"
            echo "   Regenerate contracts with: npm run contracts:generate"
            exit 1
          }
          echo "✅ Enum contracts verified"

      - name: SQL hygiene check
        run: |
          echo "🔍 Running SQL hygiene check..."
          npm run sql:hygiene || {
            echo "❌ SQL hygiene check found issues!"
            echo "   Review the issues above and fix them before merging."
            exit 1
          }
          echo "✅ SQL hygiene check passed"

      - name: Gateway usage enforcement
        run: |
          echo "🔒 Checking gateway usage enforcement..."
          npm run gateway:check || {
            echo "❌ Gateway usage violations detected!"
            echo "   All Supabase calls must go through canonical gateways:"
            echo "   - RPC calls → src/lib/rpc.ts"
            echo "   - Database mutations → src/lib/db.ts"
            exit 1
          }
          echo "✅ Gateway usage check passed"

      - name: Check for protected table mutations
        run: |
          echo "🔒 Checking for direct mutations to protected tables..."

          # Protected tables that should ONLY be mutated via canonical RPCs
          PROTECTED_TABLES=("transactions_v2" "yield_distributions" "fund_aum_events" "fund_daily_aum")

          FOUND_VIOLATIONS=0
          for table in "${PROTECTED_TABLES[@]}"; do
            # Look for direct .insert(), .update(), .delete() on protected tables
            # Exclude lib/rpc.ts and lib/db.ts which are allowed
            MATCHES=$(grep -rn "from(['\"\`]${table}['\"\`]).*\.(insert|update|delete|upsert)" src/ \
              --include="*.ts" --include="*.tsx" \
              | grep -v "lib/rpc" | grep -v "lib/db" | grep -v "contracts" || true)

            if [ -n "$MATCHES" ]; then
              echo "❌ Found direct mutations to protected table: ${table}"
              echo "$MATCHES"
              FOUND_VIOLATIONS=1
            fi
          done

          if [ $FOUND_VIOLATIONS -eq 1 ]; then
            echo ""
            echo "❌ FAIL: Found direct mutations to protected tables!"
            echo "   Use canonical RPC functions instead:"
            echo "   - transactions_v2: rpc.deposit(), rpc.withdrawal(), rpc.call('apply_transaction_with_crystallization', ...)"
            echo "   - yield_distributions: rpc.applyYield(), rpc.call('void_yield_distribution', ...)"
            echo "   - fund_aum_events: Use crystallization RPCs"
            echo "   - fund_daily_aum: rpc.call('set_fund_daily_aum', ...)"
            exit 1
          fi

          echo "✅ No unauthorized mutations to protected tables found"

      - name: Check for composite PK misuse
        run: |
          echo "🔍 Checking for composite PK misuse..."

          # Tables with composite PKs (cannot use .select("id"))
          COMPOSITE_PK_TABLES=("investor_positions")

          FOUND_VIOLATIONS=0
          for table in "${COMPOSITE_PK_TABLES[@]}"; do
            # Look for .from("table")...select("id") patterns
            MATCHES=$(grep -rn "from(['\"\`]${table}['\"\`]).*\.select(['\"\`].*id" src/ \
              --include="*.ts" --include="*.tsx" || true)

            if [ -n "$MATCHES" ]; then
              echo "❌ Found potential .select('id') on composite PK table: ${table}"
              echo "$MATCHES"
              FOUND_VIOLATIONS=1
            fi
          done

          if [ $FOUND_VIOLATIONS -eq 1 ]; then
            echo ""
            echo "❌ FAIL: Found .select('id') on tables with composite primary keys!"
            echo "   investor_positions uses (investor_id, fund_id) as its PK."
            echo "   Use .select('investor_id, fund_id') instead of .select('id')."
            exit 1
          fi

          echo "✅ No composite PK misuse found"

      - name: Check for FIRST_INVESTMENT enum usage
        run: |
          echo "🔍 Checking for invalid FIRST_INVESTMENT enum usage..."

          # Look for FIRST_INVESTMENT being sent to database (not as UI-only value)
          MATCHES=$(grep -rn "['\"\`]FIRST_INVESTMENT['\"\`]" src/ \
            --include="*.ts" --include="*.tsx" \
            | grep -v "contracts" | grep -v "mapUITypeToDb" | grep -v "// UI-only" || true)

          if [ -n "$MATCHES" ]; then
            echo "⚠️  Found FIRST_INVESTMENT usage (review required):"
            echo "$MATCHES"
            echo ""
            echo "Note: FIRST_INVESTMENT is UI-only. Use mapUITypeToDb() to convert to DEPOSIT."
          fi

          echo "✅ FIRST_INVESTMENT check complete"

  qa-invariants:
    name: QA Invariant Checks
    runs-on: ubuntu-latest
    needs: sql-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for raw enum string literals
        run: |
          echo "Checking for raw enum literals outside contracts..."

          # Known enum values that should come from contracts
          RAW_ENUMS=("DEPOSIT" "WITHDRAWAL" "YIELD" "FEE_CREDIT" "IB_CREDIT" "IB_DEBIT" "INTERNAL_WITHDRAWAL" "INTERNAL_CREDIT")

          FOUND_RAW=0
          for enum_val in "${RAW_ENUMS[@]}"; do
            MATCHES=$(grep -rn "\"${enum_val}\"\|'${enum_val}'" src/pages/ src/components/ src/hooks/ \
              --include="*.ts" --include="*.tsx" \
              | grep -v "contracts" | grep -v "dbEnums" | grep -v "\.test\." | grep -v "\.spec\." \
              | grep -v "import " | grep -v "queryKey" | grep -v "// " || true)

            if [ -n "$MATCHES" ]; then
              echo "Found raw enum '${enum_val}':"
              echo "$MATCHES" | head -5
              FOUND_RAW=1
            fi
          done

          if [ $FOUND_RAW -eq 1 ]; then
            echo ""
            echo "WARNING: Raw enum string literals found outside contracts/"
            echo "  Import from @/contracts/dbEnums instead."
            # Non-blocking for now (warn only)
          fi

          echo "Raw enum check complete"

      - name: Check dual enum source alignment
        run: |
          echo "Checking dual enum source alignment..."

          # Verify dbEnums.ts and domains/enums.ts export same values
          # This is a static check - counts exports
          DB_ENUM_EXPORTS=$(grep -c "export const" src/contracts/dbEnums.ts || echo "0")
          DOMAIN_ENUM_EXPORTS=$(grep -c "export const" src/types/domains/enums.ts || echo "0")

          echo "  dbEnums.ts exports: $DB_ENUM_EXPORTS"
          echo "  domains/enums.ts exports: $DOMAIN_ENUM_EXPORTS"

          # Check stress_test is in TX_SOURCE_VALUES
          if ! grep -q "stress_test" src/contracts/dbEnums.ts; then
            echo "FAIL: stress_test missing from TX_SOURCE_VALUES in dbEnums.ts"
            exit 1
          fi

          echo "Dual source check complete"

      - name: Check for dust in yield distributions
        run: |
          echo "Checking for dust references in yield RPCs..."

          # After Phase 7 migration, dust_amount should be zero or removed
          # For now, just document dust usage
          DUST_REFS=$(grep -rn "dust_amount\|dust_receiver" src/ \
            --include="*.ts" --include="*.tsx" | wc -l || echo "0")

          echo "  Dust references in frontend: $DUST_REFS"

          if [ "$DUST_REFS" -gt "0" ]; then
            echo "  Note: dust fields still referenced in frontend code"
            echo "  These should be removed after dust elimination migration"
          fi

          echo "Dust check complete"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
