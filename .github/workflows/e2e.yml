name: E2E Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL for E2E tests'
        required: false
        default: ''

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox
      
      - name: Build application
        run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: Start server and run tests
        run: |
          # Start the preview server in background
          pnpm preview --port 8080 &
          SERVER_PID=$!
          
          # Wait for server to be ready
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "Server is ready!"
              break
            fi
            sleep 1
          done
          
          # Run Playwright tests
          pnpm exec playwright test --reporter=html,github
          TEST_EXIT_CODE=$?
          
          # Cleanup
          kill $SERVER_PID 2>/dev/null || true
          
          exit $TEST_EXIT_CODE
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || 'http://localhost:8080' }}
          CI: true
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-reports/playwright/
          retention-days: 14
      
      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
      
      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let summary = '## 🎭 Playwright E2E Test Results\n\n';
            
            // Check for results file
            const resultsPath = 'test-reports/playwright/results.json';
            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const passed = results.suites?.reduce((acc, suite) => 
                acc + suite.specs?.filter(s => s.ok).length || 0, 0) || 0;
              const failed = results.suites?.reduce((acc, suite) => 
                acc + suite.specs?.filter(s => !s.ok).length || 0, 0) || 0;
              
              if (failed === 0) {
                summary += `✅ **All ${passed} tests passed!**\n`;
              } else {
                summary += `❌ **${failed} tests failed** out of ${passed + failed}\n`;
              }
            } else {
              summary += '⚠️ No test results found\n';
            }
            
            summary += '\n📊 [View full report](../actions/runs/${{ github.run_id }})';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium
      
      - name: Run visual tests
        run: |
          pnpm exec playwright test --project=chromium --grep @visual || true
        continue-on-error: true
      
      - name: Upload visual diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: test-results/**/*.png
          retention-days: 7
