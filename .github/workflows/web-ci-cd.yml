name: Web CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci-cd.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Install Dependencies
        run: |
          cd web
          npm ci
      
      - name: Run ESLint
        run: |
          cd web
          npm run lint
        continue-on-error: true
      
      - name: Run TypeScript Check
        run: |
          cd web
          npm run type-check

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Install Dependencies
        run: |
          cd web
          npm ci
      
      - name: Run Unit Tests
        run: |
          cd web
          npm run test:unit -- --coverage
        continue-on-error: true
      
      - name: Run E2E Tests
        run: |
          cd web
          npx playwright install --with-deps
          npm run test:e2e
        continue-on-error: true
      
      - name: Upload Coverage Reports
        if: always()
        uses: codecov/codecov-action@v3
        with:
          directory: ./web/coverage
          flags: unittests
          name: codecov-web
          fail_ci_if_error: false

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Run npm audit
        run: |
          cd web
          npm audit --audit-level=high
        continue-on-error: true
      
      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high --file=web/package.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
      
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'IndigoInvestor-Web'
          path: './web'
          format: 'HTML'
        continue-on-error: true
      
      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: reports/

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Install Dependencies
        run: |
          cd web
          npm ci
      
      - name: Set Environment Variables
        run: |
          cd web
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "Building for production"
            cp .env.production .env
          else
            echo "Building for staging"
            cp .env.staging .env
          fi
      
      - name: Build Application
        run: |
          cd web
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_WEB }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: web/.next/

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Download Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts
          path: web/.next/
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Vercel CLI
        run: npm install -g vercel
      
      - name: Deploy to Vercel
        run: |
          cd web
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel deploy --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            ${{ github.ref == 'refs/heads/main' && 'https://invest.indigocyber.com' || 'https://staging.invest.indigocyber.com' }}
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

  database-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Supabase CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/supabase/cli/main/install.sh | sh
      
      - name: Run Migrations
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      
      - name: Verify RLS Policies
        run: |
          supabase db lint
        continue-on-error: true

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-vercel, database-migrations]
    if: always()
    steps:
      - name: Notify Slack - Success
        if: ${{ needs.deploy-vercel.result == 'success' }}
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            ✅ Web Deployment Successful
            Environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}
            URL: ${{ github.ref == 'refs/heads/main' && 'https://invest.indigocyber.com' || 'https://staging.invest.indigocyber.com' }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Notify Slack - Failure
        if: ${{ needs.deploy-vercel.result == 'failure' }}
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            ❌ Web Deployment Failed
            Environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}
            Check the workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Create Sentry Release
        if: ${{ needs.deploy-vercel.result == 'success' && github.ref == 'refs/heads/main' }}
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: indigo-web
        with:
          environment: production
          version: ${{ github.sha }}
