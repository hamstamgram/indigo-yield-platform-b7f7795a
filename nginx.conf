events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;
        
        # Auth endpoints - proxy to GoTrue on port 9999
        location ~ ^/auth/v1/(.*)$ {
            proxy_pass http://host.docker.internal:9999/$1$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header apikey $http_apikey;
            proxy_set_header Authorization $http_authorization;
        }
        
        # REST API endpoints - proxy to PostgREST on port 54321
        location ~ ^/rest/v1/(.*)$ {
            proxy_pass http://host.docker.internal:54321/$1$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header apikey $http_apikey;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Prefer $http_prefer;
            proxy_set_header Content-Profile $http_content_profile;
        }
        
        # Realtime endpoints (if needed later)
        location ~ ^/realtime/v1/(.*)$ {
            return 404;
        }
        
        # Storage endpoints (if needed later)
        location ~ ^/storage/v1/(.*)$ {
            return 404;
        }
        
        # Default response
        location / {
            default_type application/json;
            return 200 '{"message":"Supabase local proxy","endpoints":{"/auth/v1":"Authentication","/rest/v1":"REST API"}}';
        }
    }
}
