# OpenClaw Inference Token Limitations & Financial Guardrails
# Automatically loaded by Gateway initialization.

session:
  max_tokens: 50000
  action_on_exceed: SHUT DOWN
  alert_priority: HIGH
  admin_override_required: true

loop_protection:
  enabled: true
  max_sequential_failures: 3
  backoff_strategy: exponential
  backoff_intervals_seconds: [60, 300, 600] # 1m, 5m, 10m

context_management:
  pruning_enabled: true
  turn_summarization_threshold: 5
  compress_history: true
